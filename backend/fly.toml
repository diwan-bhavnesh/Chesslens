# fly.toml app configuration file generated for chesslens-api on 2026-05-27T16:12:47+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'chesslens-api'
primary_region = 'sin'

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "python3 -m alembic upgrade head"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
