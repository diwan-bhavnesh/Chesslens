app = "chesslens-api"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "python3 -m alembic upgrade head"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
